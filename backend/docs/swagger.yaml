openapi: 3.0.3
info:
  title: PrimeTrade Backend Assignment API
  version: 1.0.0
  description: REST API with JWT auth, RBAC, and task CRUD.
servers:
  - url: http://localhost:5000
tags:
  - name: Auth
  - name: Tasks
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          example: john@example.com
        password:
          type: string
          example: StrongPass1
        role:
          type: string
          enum: [user, admin]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          example: john@example.com
        password:
          type: string
          example: StrongPass1
    TaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: Ship assignment
        description:
          type: string
          example: Complete backend assignment today
        status:
          type: string
          enum: [todo, in-progress, done]
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List tasks (admin sees all)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of tasks
    post:
      tags: [Tasks]
      summary: Create a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "201":
          description: Task created
  /api/v1/tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get one task by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task detail
    patch:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
      responses:
        "200":
          description: Task updated
    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task deleted
